name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Install Swift 6.3 toolchain
        run: |
          wget -q https://download.swift.org/swift-6.3-release/xcode/swift-6.3-RELEASE/swift-6.3-RELEASE-osx.pkg
          sudo installer -pkg swift-6.3-RELEASE-osx.pkg -target /
          TOOLCHAIN_BIN="/Library/Developer/Toolchains/swift-6.3-RELEASE.xctoolchain/usr/bin"
          echo "${TOOLCHAIN_BIN}" >> $GITHUB_PATH

      - name: Verify Swift version
        run: swift --version

      - name: Checkout Peregrine
        uses: actions/checkout@v4
        with:
          path: Peregrine

      - name: Checkout Spectro
        uses: actions/checkout@v4
        with:
          repository: Spectro-ORM/Spectro
          path: Spectro

      - name: Checkout Nexus
        uses: actions/checkout@v4
        with:
          repository: Spectro-ORM/Nexus
          path: Nexus

      - name: Checkout ESW
        uses: actions/checkout@v4
        with:
          repository: Spectro-ORM/ESW
          path: esw

      - name: Resolve packages
        working-directory: Peregrine
        run: swift package resolve

      - name: Patch swift-configuration for Swift 6.3 compatibility
        run: |
          FILE="Peregrine/.build/checkouts/swift-configuration/Sources/Configuration/Providers/Files/FileProvider.swift"
          if [ -f "$FILE" ]; then
            sed -i '' 's/data: fileContents!\.bytes/data: Array(fileContents!)/' "$FILE"
          fi

      - name: Build
        working-directory: Peregrine
        run: swift build

      - name: Test
        working-directory: Peregrine
        run: swift test
